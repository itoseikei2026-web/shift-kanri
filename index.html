<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クリニック シフト管理</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --bg: #f0f4f8;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ---- AUTH ---- */
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .auth-card { background: white; border-radius: 14px; padding: 2rem; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
    .auth-title { font-size: 1.4rem; font-weight: 800; text-align: center; margin-bottom: 1.5rem; color: var(--primary); }
    .form-group { margin-bottom: 0.875rem; }
    label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.3rem; }
    .form-input, .form-select {
      width: 100%; padding: 0.55rem 0.75rem; border: 1.5px solid var(--border);
      border-radius: 7px; font-size: 0.875rem; outline: none; transition: border-color 0.2s; background: white;
    }
    .form-input:focus, .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.5rem 1rem; border-radius: 7px; font-size: 0.875rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-primary { background: var(--primary); color: white; width: 100%; padding: 0.65rem; font-size: 0.95rem; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: #f1f5f9; color: var(--text); }
    .btn-secondary:hover { background: #e2e8f0; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-sm { padding: 0.2rem 0.5rem; font-size: 0.72rem; border-radius: 5px; }
    .btn-xs { padding: 0.15rem 0.4rem; font-size: 0.65rem; border-radius: 4px; }
    .link-btn { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 0.85rem; text-decoration: underline; }
    .msg-error { background: #fee2e2; color: #b91c1c; border-radius: 7px; padding: 0.5rem 0.75rem; font-size: 0.8rem; margin-bottom: 0.75rem; }
    .msg-ok { background: #dcfce7; color: #15803d; border-radius: 7px; padding: 0.5rem 0.75rem; font-size: 0.8rem; margin-bottom: 0.75rem; }

    /* ---- HEADER ---- */
    .header {
      background: var(--primary); color: white;
      padding: 0.65rem 1rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header-title { font-weight: 800; font-size: 0.95rem; letter-spacing: 0.02em; }
    .header-nav { display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap; }
    .nav-btn {
      background: rgba(255,255,255,0.15); border: none; color: white;
      padding: 0.25rem 0.65rem; border-radius: 5px; cursor: pointer;
      font-size: 0.75rem; font-weight: 600; transition: background 0.15s;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.28); }
    .nav-btn.active { background: rgba(255,255,255,0.35); }

    /* ---- CALENDAR ---- */
    .cal-wrap { padding: 0.75rem; max-width: 1100px; margin: 0 auto; }
    .cal-nav {
      display: flex; align-items: center; justify-content: space-between;
      background: white; border-radius: 10px; padding: 0.65rem 1rem;
      margin-bottom: 0.6rem; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .cal-nav-title { font-size: 1.1rem; font-weight: 800; }
    .mn-btn {
      background: #f1f5f9; border: 1.5px solid var(--border);
      padding: 0.3rem 0.75rem; border-radius: 6px; cursor: pointer;
      font-size: 0.8rem; font-weight: 600; transition: all 0.15s;
    }
    .mn-btn:hover { background: #e2e8f0; }

    .legend {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      background: white; padding: 0.45rem 0.75rem;
      border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      margin-bottom: 0.6rem;
    }
    .legend-item { display: flex; align-items: center; gap: 0.25rem; font-size: 0.68rem; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 2px; background: var(--border);
      border-radius: 10px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .cal-dow {
      background: #1e293b; color: white;
      text-align: center; padding: 0.45rem;
      font-size: 0.72rem; font-weight: 700;
    }
    .cal-dow.s { background: #dc2626; }
    .cal-dow.sa { background: #1d4ed8; }

    .cal-cell {
      background: white; min-height: 90px;
      padding: 0.3rem; cursor: pointer; transition: background 0.12s; position: relative;
    }
    .cal-cell:hover { background: #f0f9ff; }
    .cal-cell.empty { background: #f8fafc; cursor: default; }
    .cal-cell.today-cell { background: #eff6ff; }
    .cal-cell.closed { background: #fafafa; cursor: default; }

    .day-num { font-size: 0.8rem; font-weight: 700; margin-bottom: 0.2rem; line-height: 1; }
    .day-num.s { color: #dc2626; }
    .day-num.sa { color: #1d4ed8; }
    .today-circle {
      background: var(--primary); color: white;
      width: 1.3rem; height: 1.3rem; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 800;
    }
    .closed-lbl { font-size: 0.6rem; color: #cbd5e1; margin-top: 0.15rem; }
    .slot-block { margin-bottom: 0.18rem; }
    .slot-lbl { font-size: 0.57rem; color: var(--muted); font-weight: 700; margin-bottom: 0.08rem; }
    .badge {
      display: inline-flex; align-items: center;
      font-size: 0.58rem; padding: 0.08rem 0.28rem;
      border-radius: 4px; margin: 0.06rem 0.06rem 0.06rem 0;
      font-weight: 600; line-height: 1.4;
    }
    .badge.me { outline: 2px solid currentColor; }
    .r-doc { background: #dbeafe; color: #1e40af; }
    .r-adm { background: #dcfce7; color: #166534; }
    .r-nur { background: #fce7f3; color: #9d174d; }
    .r-tec { background: #fef9c3; color: #854d0e; }
    .r-pt  { background: #f3e8ff; color: #6b21a8; }
    .r-oth { background: #f1f5f9; color: #334155; }
    .empty-slot { font-size: 0.55rem; color: #cbd5e1; }

    /* ---- MODAL ---- */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 500; padding: 1rem;
    }
    .modal {
      background: white; border-radius: 14px; padding: 1.5rem;
      width: 100%; max-width: 480px; max-height: 90vh;
      overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }
    .modal-title {
      font-size: 1rem; font-weight: 800;
      margin-bottom: 1rem; padding-bottom: 0.65rem;
      border-bottom: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-close { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--muted); }
    .slot-section {
      margin-bottom: 0.75rem; padding: 0.75rem;
      background: #f8fafc; border-radius: 8px; border: 1.5px solid var(--border);
    }
    .slot-head { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.4rem; }
    .slot-time { font-size: 0.68rem; color: var(--muted); font-weight: 400; }
    .staff-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.3rem 0.4rem; background: white; border-radius: 6px;
      border: 1px solid var(--border); margin-bottom: 0.3rem;
    }
    .staff-left { display: flex; align-items: center; gap: 0.4rem; }
    .modal-badge { font-size: 0.75rem; padding: 0.15rem 0.4rem; border-radius: 5px; }
    .add-row { display: flex; gap: 0.4rem; margin-top: 0.4rem; flex-wrap: wrap; }
    .add-sel {
      flex: 1; min-width: 140px; padding: 0.35rem 0.5rem;
      border: 1.5px solid var(--border); border-radius: 6px;
      font-size: 0.78rem; background: white;
    }

    /* ---- STAFF TABLE ---- */
    .staff-wrap { padding: 0.75rem; max-width: 860px; margin: 0 auto; }
    .staff-head { font-size: 1rem; font-weight: 800; margin-bottom: 0.75rem; }
    .staff-tbl {
      width: 100%; border-collapse: collapse;
      background: white; border-radius: 10px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .staff-tbl th { background: #1e293b; color: white; padding: 0.55rem 0.75rem; font-size: 0.78rem; text-align: left; }
    .staff-tbl td { padding: 0.45rem 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
    .staff-tbl tr:last-child td { border-bottom: none; }
    .staff-tbl tr:hover td { background: #f8fafc; }
    .tag { font-size: 0.68rem; padding: 0.15rem 0.45rem; border-radius: 4px; font-weight: 600; }
    .tag-admin { background: #dbeafe; color: #1e40af; }
    .tag-staff { background: #f1f5f9; color: var(--muted); }

    /* ---- PROFILE ---- */
    .prof-wrap { padding: 0.75rem; max-width: 500px; margin: 0 auto; }
    .prof-card { background: white; border-radius: 10px; padding: 1.25rem; margin-bottom: 0.75rem; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .prof-title { font-size: 0.78rem; color: var(--muted); font-weight: 700; margin-bottom: 0.65rem; }
    .info-row { display: flex; gap: 0.5rem; margin-bottom: 0.4rem; align-items: center; }
    .info-key { font-size: 0.75rem; color: var(--muted); width: 52px; flex-shrink: 0; }
    .info-val { font-size: 0.85rem; font-weight: 600; }
    .my-shift-item {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.4rem 0.5rem; background: #f8fafc;
      border-radius: 6px; margin-bottom: 0.3rem; font-size: 0.82rem;
    }
    .slot-tag {
      font-size: 0.68rem; padding: 0.1rem 0.4rem; border-radius: 4px; font-weight: 600;
    }
    .slot-am { background: #dbeafe; color: #1e40af; }
    .slot-pm { background: #fef3c7; color: #92400e; }

    /* ---- SETUP SCREEN ---- */
    .setup-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .setup-card { background: white; border-radius: 14px; padding: 2rem; max-width: 640px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
    .setup-card h1 { font-size: 1.3rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem; }
    .setup-card p { font-size: 0.85rem; color: var(--muted); margin-bottom: 1rem; line-height: 1.6; }
    .step { background: #f8fafc; border-radius: 8px; padding: 0.85rem 1rem; margin-bottom: 0.65rem; border-left: 4px solid var(--primary); }
    .step-num { font-size: 0.7rem; font-weight: 800; color: var(--primary); margin-bottom: 0.2rem; }
    .step p { font-size: 0.8rem; margin-bottom: 0.5rem; }
    .step code { background: #e2e8f0; padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.75rem; font-family: monospace; }
    pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 8px; font-size: 0.72rem; overflow-x: auto; line-height: 1.6; margin: 0.5rem 0; }

    /* ---- LOADING ---- */
    .loading { display: flex; align-items: center; justify-content: center; min-height: 200px; color: var(--muted); font-size: 0.85rem; gap: 0.5rem; }
    .spinner { width: 1.5rem; height: 1.5rem; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 600px) {
      .cal-cell { min-height: 68px; padding: 0.2rem; }
      .cal-dow { font-size: 0.65rem; padding: 0.3rem; }
      .badge { font-size: 0.5rem; }
      .slot-lbl { font-size: 0.5rem; }
      .cal-wrap { padding: 0.4rem; }
    }
    @media print {
      .header, .cal-nav, .legend { display: none; }
      .cal-cell { cursor: default; }
    }
  </style>
</head>
<body>

<div id="app">
  <div class="loading"><div class="spinner"></div>読み込み中...</div>
</div>

<script>
// ================================================================
// ★ STEP 1: Firebase の設定をここに貼り付けてください ★
// ================================================================
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyA5-U8hRAnn4Wmuar6NVzSRY9S4a3TCvcE",
  authDomain:        "itoseikei2026-886cf.firebaseapp.com",
  projectId:         "itoseikei2026-886cf",
  storageBucket:     "itoseikei2026-886cf.firebasestorage.app",
  messagingSenderId: "1035039083236",
  appId:             "1:1035039083236:web:d022844160160216603af1"
};
// ================================================================

// ================================================================
// 定数
// ================================================================
const ROLES = ['医師', '事務', '看護師', '技師', '理学療法士'];
const ROLE_CSS = { '医師':'r-doc', '事務':'r-adm', '看護師':'r-nur', '技師':'r-tec', '理学療法士':'r-pt' };
const ROLE_BG  = { '医師':'#dbeafe', '事務':'#dcfce7', '看護師':'#fce7f3', '技師':'#fef9c3', '理学療法士':'#f3e8ff' };
const DOW_JP = ['日','月','火','水','木','金','土'];

// 診療シフト定義
// 0=日（休診）, 1=月, 2=火（午前のみ）, 3=水, 4=木, 5=金, 6=土
function availableSlots(dow) {
  if (dow === 0) return [];
  if (dow === 2) return ['morning'];
  return ['morning','afternoon'];
}
const SLOT = {
  morning:   { label:'午前', time:'8:40〜13:40',  icon:'🌅' },
  afternoon: { label:'午後', time:'15:00〜19:30', icon:'🌆' }
};

// ================================================================
// STATE
// ================================================================
const S = {
  view: 'loading',
  user: null,
  userData: null,
  year: new Date().getFullYear(),
  month: new Date().getMonth(),
  shifts: {},      // { "YYYY-MM-DD": { morning:[...], afternoon:[...] } }
  staff: [],       // all users
  modal: null,     // { date, dow }
  err: null,
  busy: false
};

// ================================================================
// HELPERS
// ================================================================
const ds = (y,m,d) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const daysIn = (y,m) => new Date(y, m+1, 0).getDate();
const firstDow = (y,m) => new Date(y, m, 1).getDay();
const isToday = (y,m,d) => { const t=new Date(); return t.getFullYear()===y&&t.getMonth()===m&&t.getDate()===d; };
const rc = r => ROLE_CSS[r]||'r-oth';
const el = id => document.getElementById(id);
const configured = () => FIREBASE_CONFIG.apiKey !== 'YOUR_API_KEY';

// ================================================================
// FIREBASE
// ================================================================
let auth, db;
if (configured()) {
  firebase.initializeApp(FIREBASE_CONFIG);
  auth = firebase.auth();
  db   = firebase.firestore();
}

async function loadShifts(y, m) {
  const pre = `${y}-${String(m+1).padStart(2,'0')}`;
  const snap = await db.collection('shifts')
    .where('date','>=',pre+'-01')
    .where('date','<=',pre+'-31')
    .get();
  const result = {};
  snap.forEach(doc => {
    const d = doc.data();
    if (!result[d.date]) result[d.date] = { morning:[], afternoon:[] };
    result[d.date][d.slot] = d.staff || [];
  });
  S.shifts = result;
  render();
}

async function loadStaff() {
  const snap = await db.collection('users').get();
  S.staff = [];
  snap.forEach(doc => S.staff.push({ uid: doc.id, ...doc.data() }));
  render();
}

async function saveSlot(date, slot, list) {
  await db.collection('shifts').doc(`${date}_${slot}`).set({ date, slot, staff: list });
  if (!S.shifts[date]) S.shifts[date] = { morning:[], afternoon:[] };
  S.shifts[date][slot] = list;
}

async function addToShift(date, slot, member) {
  const cur = (S.shifts[date]||{})[slot]||[];
  if (cur.find(x => x.uid === member.uid)) return;
  await saveSlot(date, slot, [...cur, member]);
}

async function removeFromShift(date, slot, uid) {
  const cur = (S.shifts[date]||{})[slot]||[];
  await saveSlot(date, slot, cur.filter(x => x.uid !== uid));
}

// ================================================================
// AUTH ACTIONS
// ================================================================
async function doLogin(e) {
  e.preventDefault();
  S.err = null; S.busy = true; render();
  try {
    await auth.signInWithEmailAndPassword(el('lEmail').value, el('lPass').value);
  } catch(ex) { S.busy=false; S.err=authMsg(ex.code); render(); }
}

async function doRegister(e) {
  e.preventDefault();
  S.err = null; S.busy = true; render();
  const name = el('rName').value.trim();
  const role = el('rRole').value;
  const email = el('rEmail').value.trim();
  const pass = el('rPass').value;
  if (!name||!role||!email||!pass) { S.busy=false; S.err='すべての項目を入力してください'; render(); return; }
  if (pass.length < 6) { S.busy=false; S.err='パスワードは6文字以上'; render(); return; }
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    const snap = await db.collection('users').get();
    const isFirst = snap.empty;
    await db.collection('users').doc(cred.user.uid).set(
      { name, role, email, isAdmin: isFirst, createdAt: new Date().toISOString() }
    );
  } catch(ex) { S.busy=false; S.err=authMsg(ex.code); render(); }
}

async function doLogout() {
  await auth.signOut();
  Object.assign(S, { view:'login', user:null, userData:null, shifts:{}, staff:[], modal:null });
  render();
}

function authMsg(code) {
  return ({
    'auth/user-not-found':'メールアドレスが見つかりません',
    'auth/wrong-password':'パスワードが正しくありません',
    'auth/invalid-credential':'メールアドレスまたはパスワードが正しくありません',
    'auth/email-already-in-use':'このメールアドレスは既に使用されています',
    'auth/weak-password':'パスワードは6文字以上',
    'auth/too-many-requests':'試行回数が多すぎます。しばらく待ってください',
  })[code] || `エラー: ${code}`;
}

// ================================================================
// RENDER
// ================================================================
function render() {
  const app = el('app');
  if (!app) return;

  if (!configured()) { app.innerHTML = setupScreen(); return; }
  if (S.view === 'loading') { app.innerHTML = `<div class="loading"><div class="spinner"></div>読み込み中...</div>`; return; }
  if (S.view === 'login' || S.view === 'register') { authScreen(app); return; }

  let body = '';
  if (S.view === 'calendar')    body = calendarView();
  else if (S.view === 'staff')  body = staffView();
  else if (S.view === 'profile') body = profileView();

  app.innerHTML = headerHTML() + `<div id="main">${body}</div>` + (S.modal ? modalHTML() : '');
  bindEvents();
}

// ---- SETUP SCREEN ----
function setupScreen() {
  return `
  <div class="setup-wrap"><div class="setup-card">
    <h1>🏥 クリニック シフト管理 — 初期設定</h1>
    <p>このアプリを使うには <strong>Firebase</strong>（無料）のセットアップが必要です。以下の手順を行ってください。</p>

    <div class="step"><div class="step-num">STEP 1</div>
      <p><a href="https://console.firebase.google.com" target="_blank" style="color:var(--primary)">console.firebase.google.com</a> にアクセスし、Googleアカウントでサインイン後「プロジェクトを追加」をクリック。プロジェクト名を入力して作成。</p>
    </div>

    <div class="step"><div class="step-num">STEP 2 — Authentication を有効化</div>
      <p>左メニュー「Authentication」→「始める」→「メール/パスワード」を有効にして保存。</p>
    </div>

    <div class="step"><div class="step-num">STEP 3 — Firestore を作成</div>
      <p>左メニュー「Firestore Database」→「データベースの作成」→「テストモードで開始」→「有効にする」。</p>
      <p>⚠️ その後、「ルール」タブを開き、以下のルールに書き換えて「公開」してください：</p>
      <pre>rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /users/{uid} {
      allow read: if request.auth != null;
      allow create: if request.auth != null && request.auth.uid == uid;
      allow update, delete: if request.auth != null &&
        get(/databases/$(database)/documents/users/$(request.auth.uid)).data.isAdmin == true
        || request.auth.uid == uid;
    }
    match /shifts/{id} {
      allow read: if request.auth != null;
      allow write: if request.auth != null &&
        get(/databases/$(database)/documents/users/$(request.auth.uid)).data.isAdmin == true;
    }
  }
}</pre>
    </div>

    <div class="step"><div class="step-num">STEP 4 — 設定コードを取得</div>
      <p>左メニュー「プロジェクトの設定（⚙歯車）」→「マイアプリ」→「&lt;/&gt; ウェブ」アイコンをクリック → アプリ名を入力して登録。</p>
      <p>表示された <code>firebaseConfig</code> のコードをコピーし、このHTMLファイルの先頭にある <code>FIREBASE_CONFIG</code> の値を書き換えてください。</p>
    </div>

    <div class="step"><div class="step-num">STEP 5 — ホスティング（院内外からアクセスするため）</div>
      <p>このHTMLファイルを <a href="https://app.netlify.com/drop" target="_blank" style="color:var(--primary)">Netlify Drop</a> にドラッグ＆ドロップするだけで無料公開できます。URLが発行されるので、そのURLをスタッフに共有してください。</p>
    </div>

    <p style="font-size:0.8rem;color:var(--muted);margin-top:0.5rem">設定後このファイルを再度開くと自動的にログイン画面が表示されます。最初に登録したユーザーが自動的に管理者になります。</p>
  </div></div>`;
}

// ---- AUTH SCREEN ----
function authScreen(app) {
  const isReg = S.view === 'register';
  const opts = ROLES.map(r => `<option value="${r}">${r}</option>`).join('');
  app.innerHTML = `
  <div class="auth-wrap"><div class="auth-card">
    <div class="auth-title">🏥 シフト管理</div>
    ${S.err ? `<div class="msg-error">${S.err}</div>` : ''}
    ${isReg ? `
      <form id="af" onsubmit="doRegister(event)">
        <div class="form-group"><label>お名前</label><input class="form-input" id="rName" type="text" placeholder="山田 太郎" required></div>
        <div class="form-group"><label>職種</label>
          <select class="form-select" id="rRole" required>
            <option value="">選択してください</option>${opts}
          </select>
        </div>
        <div class="form-group"><label>メールアドレス</label><input class="form-input" id="rEmail" type="email" required></div>
        <div class="form-group"><label>パスワード（6文字以上）</label><input class="form-input" id="rPass" type="password" required></div>
        <button class="btn btn-primary" ${S.busy?'disabled':''} type="submit">${S.busy?'登録中...':'アカウント登録'}</button>
        <div style="text-align:center;margin-top:0.75rem">
          <button class="link-btn" onclick="goView('login')">すでにアカウントをお持ちの方はこちら</button>
        </div>
      </form>
    ` : `
      <form id="af" onsubmit="doLogin(event)">
        <div class="form-group"><label>メールアドレス</label><input class="form-input" id="lEmail" type="email" required></div>
        <div class="form-group"><label>パスワード</label><input class="form-input" id="lPass" type="password" required></div>
        <button class="btn btn-primary" ${S.busy?'disabled':''} type="submit">${S.busy?'ログイン中...':'ログイン'}</button>
        <div style="text-align:center;margin-top:0.75rem">
          <button class="link-btn" onclick="goView('register')">新規登録はこちら</button>
        </div>
      </form>
    `}
  </div></div>`;
}

// ---- HEADER ----
function headerHTML() {
  const isAdmin = S.userData?.isAdmin;
  const name = S.userData?.name || '';
  return `
  <div class="header">
    <div class="header-title">🏥 シフト管理</div>
    <div class="header-nav">
      <button class="nav-btn ${S.view==='calendar'?'active':''}" onclick="goView('calendar')">📅 カレンダー</button>
      ${isAdmin ? `<button class="nav-btn ${S.view==='staff'?'active':''}" onclick="goView('staff')">👥 スタッフ</button>` : ''}
      <button class="nav-btn ${S.view==='profile'?'active':''}" onclick="goView('profile')">👤 ${name}</button>
    </div>
  </div>`;
}

// ---- CALENDAR ----
function calendarView() {
  const { year: y, month: m } = S;
  const total = daysIn(y, m);
  const first = firstDow(y, m);
  const isAdmin = S.userData?.isAdmin;
  const myUid = S.user?.uid;
  const mNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  let cells = '';
  for (let i = 0; i < first; i++) cells += `<div class="cal-cell empty"></div>`;

  for (let d = 1; d <= total; d++) {
    const dow = new Date(y, m, d).getDay();
    const dateKey = ds(y, m, d);
    const slots = availableSlots(dow);
    const closed = slots.length === 0;
    const today = isToday(y, m, d);

    let cls = 'cal-cell' + (closed?' closed':'') + (today?' today-cell':'');
    let dowCls = dow===0?' s': dow===6?' sa':'';

    let dayNumHTML = today
      ? `<span class="today-circle">${d}</span>`
      : `${d}`;

    let inner = '';
    if (closed) {
      inner = '<div class="closed-lbl">休診</div>';
    } else {
      const sd = S.shifts[dateKey] || {};
      for (const slot of slots) {
        const list = sd[slot] || [];
        const badges = list.map(s => {
          const me = s.uid === myUid;
          return `<span class="badge ${rc(s.role)}${me?' me':''}">${s.name}</span>`;
        }).join('') || `<span class="empty-slot">未定</span>`;
        inner += `<div class="slot-block"><div class="slot-lbl">${SLOT[slot].label}</div><div>${badges}</div></div>`;
      }
    }

    const click = !closed ? `onclick="openModal('${dateKey}',${dow})"` : '';
    cells += `<div class="${cls}" ${click}><div class="day-num${dowCls}">${dayNumHTML}</div>${inner}</div>`;
  }

  const legendHTML = ROLES.map(r =>
    `<div class="legend-item"><span class="legend-dot" style="background:${ROLE_BG[r]||'#f1f5f9'}"></span>${r}</div>`
  ).join('');

  return `
  <div class="cal-wrap">
    <div class="cal-nav">
      <button class="mn-btn" onclick="shiftMonth(-1)">◀ 前月</button>
      <span class="cal-nav-title">${y}年 ${mNames[m]}</span>
      <button class="mn-btn" onclick="shiftMonth(1)">次月 ▶</button>
    </div>
    <div class="legend">${legendHTML}</div>
    <div class="cal-grid">
      ${DOW_JP.map((d,i)=>`<div class="cal-dow${i===0?' s':i===6?' sa':''}">${d}</div>`).join('')}
      ${cells}
    </div>
    <div style="margin-top:0.5rem;font-size:0.72rem;color:var(--muted);text-align:center">
      ${isAdmin ? '📝 日付をクリックしてシフトを編集できます　|　太枠バッジ＝自分のシフト' : '日付をクリックして詳細を確認できます　|　太枠バッジ＝自分のシフト'}
    </div>
  </div>`;
}

// ---- DAY MODAL ----
function modalHTML() {
  const { date, dow } = S.modal;
  const slots = availableSlots(dow);
  const sd = S.shifts[date] || {};
  const isAdmin = S.userData?.isAdmin;
  const myUid = S.user?.uid;
  const [y,mo,d] = date.split('-');
  const label = `${y}年${parseInt(mo)}月${parseInt(d)}日（${DOW_JP[dow]}）`;

  let html = '';
  for (const slot of slots) {
    const list = sd[slot] || [];
    const rows = list.map(s => {
      const me = s.uid === myUid;
      return `<div class="staff-row">
        <div class="staff-left">
          <span class="badge modal-badge ${rc(s.role)}">${s.name}</span>
          <span style="font-size:0.72rem;color:var(--muted)">${s.role}</span>
          ${me?'<span style="font-size:0.65rem;color:var(--primary);font-weight:700">(自分)</span>':''}
        </div>
        ${isAdmin?`<button class="btn btn-danger btn-xs" onclick="rmStaff('${date}','${slot}','${s.uid}')">削除</button>`:''}
      </div>`;
    }).join('') || `<div style="font-size:0.78rem;color:#94a3b8;padding:0.2rem 0">未割り当て</div>`;

    let addForm = '';
    if (isAdmin) {
      const avail = S.staff.filter(x => !list.find(a => a.uid === x.uid));
      const opts = avail.map(x => `<option value="${x.uid}">${x.name}（${x.role}）</option>`).join('');
      addForm = `<div class="add-row">
        <select class="add-sel" id="sel_${slot}"><option value="">スタッフを選択...</option>${opts}</select>
        <button class="btn btn-secondary btn-sm" onclick="addStaff('${date}','${slot}')">追加</button>
      </div>`;
    }

    html += `<div class="slot-section">
      <div class="slot-head">${SLOT[slot].icon} ${SLOT[slot].label} <span class="slot-time">${SLOT[slot].time}</span></div>
      ${rows}
      ${addForm}
    </div>`;
  }

  return `
  <div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-title">
        📅 ${label}
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      ${html}
      <div style="text-align:right;margin-top:0.75rem">
        <button class="btn btn-secondary" onclick="closeModal()">閉じる</button>
      </div>
    </div>
  </div>`;
}

// ---- STAFF VIEW ----
function staffView() {
  const rows = S.staff.map(s => `<tr>
    <td>${s.name}</td>
    <td><span class="badge ${rc(s.role)}">${s.role}</span></td>
    <td style="font-size:0.75rem">${s.email}</td>
    <td><span class="tag ${s.isAdmin?'tag-admin':'tag-staff'}">${s.isAdmin?'管理者':'スタッフ'}</span></td>
    <td>
      <button class="btn btn-secondary btn-xs" onclick="toggleAdmin('${s.uid}',${s.isAdmin})" style="margin-right:3px">
        ${s.isAdmin?'権限解除':'管理者に'}
      </button>
      <button class="btn btn-danger btn-xs" onclick="delStaff('${s.uid}')">削除</button>
    </td>
  </tr>`).join('') || `<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:1rem">スタッフが登録されていませこ</td></tr>`;

  return `
  <div class="staff-wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem">
      <div class="staff-head">👥 スタッフ管理</div>
      <span style="font-size:0.78rem;color:var(--muted)">${S.staff.length}名登録</span>
    </div>
    <div style="overflow-x:auto">
      <table class="staff-tbl">
        <thead><tr><th>氏名</th><th>職種</th><th>メール</th><th>権限</th><th>操作</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div style="margin-top:0.75rem;background:#f8fafc;border-radius:8px;padding:0.65rem 0.85rem;font-size:0.77rem;color:var(--muted);border:1px solid var(--border)">
      💡 スタッフが自分でアカウント登録後、ここで管理者権限を付与できます。最初に登録したユーザーは自動的に管理者になります。
    </div>
  </div>`;
}

// ---- PROFILE VIEW ----
function profileView() {
  const u = S.userData;
  if (!u) return '<div class="loading">読み込み中...</div>';
  const { year: y, month: m } = S;
  const myUid = S.user?.uid;
  const mNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  let myShifts = [];
  for (let d = 1; d <= daysIn(y,m); d++) {
    const dateKey = ds(y,m,d);
    const dow = new Date(y,m,d).getDay();
    const sd = S.shifts[dateKey] || {};
    for (const slot of ['morning','afternoon']) {
      if ((sd[slot]||[]).find(x => x.uid === myUid)) {
        myShifts.push({ d, dow, slot });
      }
    }
  }

  const shiftHTML = myShifts.length
    ? myShifts.map(s => `
        <div class="my-shift-item">
          <span style="font-weight:700;min-width:2rem">${s.d}日</span>
          <span style="color:var(--muted);font-size:0.75rem">${DOW_JP[s.dow]}</span>
          <span class="slot-tag ${s.slot==='morning'?'slot-am':'slot-pm'}">${SLOT[s.slot].label} ${SLOT[s.slot].time}</span>
        </div>`).join('')
    : `<div style="color:#94a3b8;font-size:0.82rem">今月のシフトはまだ割り当てられていませこ</div>`;

  return `
  <div class="prof-wrap">
    <div class="prof-card">
      <div class="prof-title">プロフィール</div>
      <div class="info-row"><span class="info-key">氏名</span><span class="info-val">${u.name}</span></div>
      <div class="info-row"><span class="info-key">職種</span><span class="badge ${rc(u.role)}">${u.role}</span></div>
      <div class="info-row"><span class="info-key">権限</span><span class="info-val">${u.isAdmin?'🔑 管理者':'👤 スタッフ'}</span></div>
      <div class="info-row"><span class="info-key">メール</span><span style="font-size:0.78rem">${u.email}</span></div>
      <button class="btn btn-secondary" style="width:100%;margin-top:1rem" onclick="doLogout()">ログアウト</button>
    </div>
    <div class="prof-card">
      <div class="prof-title">📅 ${y}年${mNames[m]}のシフト（${myShifts.length}件）</div>
      ${shiftHTML}
    </div>
  </div>`;
}

// ================================================================
// UI ACTIONS
// ================================================================
function goView(v) {
  if (v === 'staff') loadStaff();
  S.view = v;
  render();
}

function shiftMonth(delta) {
  S.month += delta;
  if (S.month < 0) { S.month = 11; S.year--; }
  if (S.month > 11) { S.month = 0; S.year++; }
  loadShifts(S.year, S.month);
}

function openModal(date, dow) {
  S.modal = { date, dow };
  render();
}

function closeModal() {
  S.modal = null;
  render();
}

async function addStaff(date, slot) {
  const sel = el(`sel_${slot}`);
  if (!sel || !sel.value) return;
  const member = S.staff.find(x => x.uid === sel.value);
  if (!member) return;
  const btn = sel.nextElementSibling;
  if (btn) { btn.disabled = true; btn.textContent = '追加中...'; }
  await addToShift(date, slot, { uid: member.uid, name: member.name, role: member.role });
  render();
}

async function rmStaff(date, slot, uid) {
  await removeFromShift(date, slot, uid);
  render();
}

async function toggleAdmin(uid, cur) {
  await db.collection('users').doc(uid).update({ isAdmin: !cur });
  const idx = S.staff.findIndex(x => x.uid === uid);
  if (idx >= 0) S.staff[idx].isAdmin = !cur;
  render();
}

async function delStaff(uid) {
  if (!confirm('このスタッフを削除しますか？')) return;
  await db.collection('users').doc(uid).delete();
  S.staff = S.staff.filter(x => x.uid !== uid);
  render();
}

function bindEvents() {
  document.onkeydown = e => { if (e.key === 'Escape' && S.modal) closeModal(); };
}

// ================================================================
// BOOT
// ================================================================
if (configured()) {
  auth.onAuthStateChanged(async user => {
    if (user) {
      S.user = user;
      try {
        const doc = await db.collection('users').doc(user.uid).get();
        if (doc.exists) S.userData = doc.data();
      } catch(e) { console.error(e); }
      S.view = 'calendar';
      S.busy = false;
      await loadShifts(S.year, S.month);
    } else {
      Object.assign(S, { user: null, userData: null, view: 'login', busy: false });
      render();
    }
  });
} else {
  S.view = 'setup';
  render();
}
</script>
